# ==========================
# Database Configuration - SAFE VERSION
# ==========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA / Hibernate Configuration
# ==========================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================
# Connection Pool Configuration
# ==========================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================
# JWT Configuration
# ==========================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==========================
# Server Configuration
# ==========================
server.port=${PORT:8085}
server.error.include-message=always
server.error.include-binding-errors=always
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# ==========================
# CORS Configuration (for frontend)
# ==========================
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true
cors.max-age=3600

# ==========================
# Google OAuth2 Configuration
# ==========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_basic

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# OAuth2 Login Success/Failure Redirects
spring.security.oauth2.client.registration.google.success-uri=${OAUTH_SUCCESS_URL:http://localhost:5173/auth?oauth2=success}
spring.security.oauth2.client.registration.google.failure-uri=${OAUTH_FAILURE_URL:http://localhost:5173/auth?oauth2=failure}

# ==========================
# Razorpay Payment Gateway Configuration
# ==========================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_SECRET}

# ==========================
# Email Configuration (Gmail)
# ==========================
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# ==========================
# Redis Configuration (for OTP Storage)
# ==========================
# Comment this out if you don't have Redis installed
# spring.redis.host=${REDIS_HOST:localhost}
# spring.redis.port=${REDIS_PORT:6379}
# spring.redis.password=${REDIS_PASSWORD}
# spring.redis.timeout=2000ms
# spring.redis.lettuce.pool.max-active=8
# spring.redis.lettuce.pool.max-idle=8
# spring.redis.lettuce.pool.min-idle=0
# spring.redis.lettuce.shutdown-timeout=100ms

# ==========================
# OTP Configuration
# ==========================
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
otp.length=${OTP_LENGTH:6}
otp.email.subject=${OTP_EMAIL_SUBJECT:Your OTP for RN Classes}
otp.email.from=${OTP_EMAIL_FROM:noreply@rnclasses.com}
otp.sms.sender-id=${OTP_SMS_SENDER:RNCLASS}
otp.max-attempts=${OTP_MAX_ATTEMPTS:3}

# ==========================
# Certificate Configuration
# ==========================
certificate.base-url=${CERTIFICATE_BASE_URL:http://localhost:8085/api/certificate/verify/}
certificate.storage-path=${CERTIFICATE_STORAGE_PATH:./certificates/}
certificate.qr-size=${CERTIFICATE_QR_SIZE:150}
certificate.font-size=${CERTIFICATE_FONT_SIZE:24}
certificate.title-font-size=${CERTIFICATE_TITLE_FONT_SIZE:36}

# ==========================
# Video Streaming Configuration
# ==========================
video.max-file-size=${VIDEO_MAX_FILE_SIZE:500MB}
video.chunk-size=${VIDEO_CHUNK_SIZE:1MB}
video.progress-save-interval=${VIDEO_PROGRESS_SAVE_INTERVAL:5}
video.supported-formats=${VIDEO_SUPPORTED_FORMATS:mp4,mkv,avi,mov}
video.max-duration-minutes=${VIDEO_MAX_DURATION_MINUTES:180}

# ==========================
# Coupon Configuration
# ==========================
coupon.max-discount-percentage=${COUPON_MAX_DISCOUNT:50}
coupon.default-codes=${COUPON_DEFAULT_CODES:RNCLASSES10,FESTIVE20,DIWALI25,NEWYEAR30}
coupon.min-order-amount=${COUPON_MIN_ORDER:100}
coupon.max-uses-per-user=${COUPON_MAX_USES:1}

# ==========================
# File Upload Configuration
# ==========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:500MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:500MB}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# ==========================
# Logging Configuration
# ==========================
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.rnclasses=${LOG_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_BINDER:TRACE}
logging.file.name=${LOG_FILE:logs/rnclasses.log}
logging.file.max-size=${LOG_MAX_SIZE:10MB}
logging.file.max-history=${LOG_MAX_HISTORY:30}
logging.pattern.console=${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}
logging.pattern.file=${LOG_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}

# ==========================
# Actuator Endpoints (for monitoring)
# ==========================
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ==========================
# Application Info
# ==========================
info.app.name=${APP_NAME:RN Classes}
info.app.description=${APP_DESCRIPTION:Online Learning Platform}
info.app.version=${APP_VERSION:1.0.0}
info.app.contact=${APP_CONTACT:support@rnclasses.com}


server.address=0.0.0.0